{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Log in</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn primary">Login</button>
    </form>
    <p class="muted">New here? <a href="{% url 'register' %}">Create an account</a>.</p>
</div>
{% endblock %}
