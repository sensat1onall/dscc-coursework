{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="top-nav">
        <div class="brand"><a href="{% url 'home' %}">Task Manager</a></div>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'task_list' %}">My Tasks</a>
                <a href="{% url 'create_task' %}">Create Task</a>
                <form method="post" action="{% url 'logout' %}" class="inline-form nav-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-link-btn">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
