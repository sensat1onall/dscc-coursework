{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Create your account</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn primary">Register</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</div>
{% endblock %}
