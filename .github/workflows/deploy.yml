name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: dscc-coursework

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dscc
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DB_NAME: dscc
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      SECURE_SSL_REDIRECT: "False"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8)
        run: flake8 core config
      - name: Format check (black)
        run: black --check --line-length 100 .
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test --verbosity 2

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ${{ secrets.GCP_SSH_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR="/opt/dscc-coursework"
            mkdir -p "$PROJECT_DIR/docker/nginx"
            cd "$PROJECT_DIR"
            echo "=== Working in: $(pwd) ==="

            echo "=== Writing docker-compose.yml ==="
            cat > docker-compose.yml << 'COMPOSEEOF'
            version: "3.9"
            services:
              web:
                image: ${WEB_IMAGE:-dscc-coursework-web:local}
                command: /bin/sh /app/docker/entrypoint.sh
                env_file: .env
                depends_on:
                  - db
                volumes:
                  - static_volume:/app/staticfiles
                  - media_volume:/app/media
                restart: unless-stopped
              db:
                image: postgres:16-alpine
                env_file: .env
                environment:
                  POSTGRES_DB: ${DB_NAME}
                  POSTGRES_USER: ${DB_USER}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped
              nginx:
                image: nginx:1.25-alpine
                ports:
                  - "80:80"
                depends_on:
                  - web
                volumes:
                  - static_volume:/app/staticfiles
                  - media_volume:/app/media
                  - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                restart: unless-stopped
            volumes:
              postgres_data:
              static_volume:
              media_volume:
            COMPOSEEOF
            sed -i 's/^            //' docker-compose.yml

            echo "=== Writing nginx config ==="
            cat > docker/nginx/default.conf << 'NGINXEOF'
            upstream django {
                server web:8000;
            }
            server {
                listen 80;
                server_name _;
                location /static/ {
                    alias /app/staticfiles/;
                }
                location /media/ {
                    alias /app/media/;
                }
                location / {
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_pass http://django;
                }
            }
            NGINXEOF
            sed -i 's/^            //' docker/nginx/default.conf

            echo "=== Logging into Docker Hub ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export WEB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            echo "=== Pulling image: $WEB_IMAGE ==="
            docker pull "$WEB_IMAGE"

            echo "=== Starting containers ==="
            docker compose pull
            docker compose up -d --no-build --remove-orphans --force-recreate

            echo "=== Running migrations ==="
            docker compose exec -T web python manage.py migrate --noinput

            echo "=== Collecting static files ==="
            docker compose exec -T web python manage.py collectstatic --noinput

            echo "=== Deployment finished successfully! ==="
